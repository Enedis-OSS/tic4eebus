site_name: tic4eebus
site_description: Documentation tic4eebus

# Multilingual configuration
plugins:
  - plantuml:
        #puml_url: https://www.plantuml.com/plantuml/
        puml_url: http://plantuml:8080
        puml_keyword: plantuml
        output_format: svg
        theme:
          enabled: true
          light: default/light
          dark: default/dark
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
          nav_translations:
            Overview: Vue d'ensemble
            Installation: Installation
            Configuration: Configuration
            "Software Architecture": Architecture logicielle
            "Data Model" : Modèle de données
        - locale: en
          name: English
          build: true
          nav_translations:
            Overview: Overview
            Installation: Installation
            Configuration: Configuration
            "Software Architecture": Software Architecture
            "Data Model" : Data Model

# Site navigation
nav:
  - Overview: index.md
  - Installation: installation.md
  - Configuration: configuration.md
  - "Software Architecture": architecture.md
  - "Data Model": data_model.md

theme:
    name: material
    language: fr
    logo: img/logo.png
    favicon: img/favicon.ico
    font:
      text: Ubuntu
    features:
          - navigation.sections
          - navigation.expand
          - navigation.indexes
          - toc.integrate
